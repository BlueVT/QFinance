name: test
channels:
  - conda-forge
  - defaults
dependencies:
  # Base dependencies
  - python
  - pip

  # Testing tools
  - pytest
  - pytest-cov

  # QFinance Specific Dependencies (installed via pip for best compatibility)
  - pip:
    - qiskit
    - qiskit-finance
    - qiskit-aer
    - qiskit-algorithms
    - qiskit-optimization
    - qiskit-machine-learning
    - matplotlib
    - yfinance
    - numpy
    - pandas
    - scipy
